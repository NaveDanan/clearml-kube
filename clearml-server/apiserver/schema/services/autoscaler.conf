_description: """This service provides autoscaler settings and workload management for external orchestration providers (e.g. Run:ai)"""
_default {
    internal: true
}

_definitions {
    include "_common.conf"
    runai_settings {
        type: object
        description: "Run:ai connection settings"
        properties {
            connection_method {
                description: "Connection method: openshift or runai_application"
                type: string
            }
            openshift_login_mode {
                description: "OpenShift login input mode: fields or command"
                type: string
            }
            openshift_api_url {
                description: "OpenShift API URL"
                type: string
            }
            openshift_token {
                description: "OpenShift authentication token"
                type: string
            }
            openshift_login_command {
                description: "Full oc login command containing server URL and token"
                type: string
            }
            runai_access_key {
                description: "Run:ai application access key/name for non-interactive login"
                type: string
            }
            runai_secret_key {
                description: "Run:ai application secret key"
                type: string
            }
            runai_cluster {
                description: "Run:ai cluster name"
                type: string
            }
            runai_project {
                description: "Run:ai project name"
                type: string
            }
            runai_cli_version {
                description: "Run:ai CLI command set: auto, v1, or v2"
                type: string
            }
            user {
                description: "ClearML user that saved the Run:ai connection"
                type: string
            }
            worker {
                description: "ClearML worker/runai_worker associated with the saved connection"
                type: string
            }
        }
    }
    workload_request {
        type: object
        description: "Workload submission request"
        properties {
            workload_type {
                description: "Type of workload: training, workspace, or inference"
                type: string
            }
            workload_name {
                description: "Name of the workload"
                type: string
            }
            project {
                description: "Run:ai project override"
                type: string
            }
            image {
                description: "Container image"
                type: string
            }
            command {
                description: "Container command"
                type: string
            }
            args {
                description: "Arguments passed after --"
                type: string
            }
            environment_variables {
                description: "Comma-separated KEY=VALUE pairs"
                type: string
            }
            template {
                description: "Run:ai template name"
                type: string
            }
            cpu_core_request {
                description: "CPU core request"
                type: string
            }
            cpu_core_limit {
                description: "CPU core limit"
                type: string
            }
            cpu_memory_request {
                description: "CPU memory request"
                type: string
            }
            cpu_memory_limit {
                description: "CPU memory limit"
                type: string
            }
            gpu_devices_request {
                description: "Number of GPU devices"
                type: string
            }
            gpu_memory_request {
                description: "GPU memory request"
                type: string
            }
            gpu_portion_request {
                description: "GPU portion request"
                type: string
            }
            gpu_request_type {
                description: "GPU request type"
                type: string
            }
            node_pools {
                description: "Comma-separated node pool names"
                type: string
            }
            node_type {
                description: "Node type"
                type: string
            }
            priority {
                description: "Scheduling priority"
                type: string
            }
            preemptibility {
                description: "Preemptibility setting"
                type: string
            }
            existing_pvc {
                description: "Existing PVC spec"
                type: string
            }
            working_dir {
                description: "Working directory"
                type: string
            }
            parallelism {
                description: "Training parallelism"
                type: string
            }
            runs {
                description: "Number of training runs"
                type: string
            }
            restart_policy {
                description: "Restart policy"
                type: string
            }
            backoff_limit {
                description: "Backoff limit"
                type: string
            }
            external_url {
                description: "External URL spec"
                type: string
            }
            serving_port {
                description: "Inference serving port"
                type: string
            }
            min_replicas {
                description: "Minimum replicas for inference"
                type: string
            }
            max_replicas {
                description: "Maximum replicas for inference"
                type: string
            }
            initial_replicas {
                description: "Initial replicas for inference"
                type: string
            }
            metric {
                description: "Autoscaling metric"
                type: string
            }
            metric_threshold {
                description: "Metric threshold value"
                type: string
            }
            scale_to_zero_retention {
                description: "Scale-to-zero retention in seconds"
                type: string
            }
        }
    }
    execution_result {
        type: object
        description: "Workload execution result"
        properties {
            status {
                description: "Execution status: queued, pending, running, success, or error"
                type: string
            }
            stdout {
                description: "Standard output from CLI"
                type: string
            }
            stderr {
                description: "Standard error from CLI"
                type: string
            }
            return_code {
                description: "CLI process return code when available"
                type: string
            }
            timestamp {
                description: "ISO timestamp of execution"
                type: string
            }
            execution_id {
                description: "Unique execution identifier"
                type: string
            }
        }
    }
    dashboard_data {
        type: object
        description: "Live Run:ai dashboard status"
        properties {
            connected {
                description: "Whether live Run:ai data was refreshed successfully"
                type: boolean
            }
            error {
                description: "Error message if refresh failed"
                type: string
            }
            timestamp {
                description: "ISO timestamp of the refresh"
                type: string
            }
            idle_instances {
                description: "Number of idle/stopped/suspended workloads"
                type: number
            }
            running_instances {
                description: "Number of running workloads"
                type: number
            }
            pending_instances {
                description: "Number of pending or queued workloads"
                type: number
            }
            failed_instances {
                description: "Number of failed workloads"
                type: number
            }
            total_instances {
                description: "Total number of workloads visible to the configured Run:ai project"
                type: number
            }
            status_counts {
                description: "Workload counts by Run:ai status"
                type: object
            }
            resources {
                description: "Cluster and project resource summary"
                type: object
            }
            queues {
                description: "Run:ai projects/queues summary"
                type: array
                items {
                    type: object
                }
            }
            instances {
                description: "Run:ai workload instances"
                type: array
                items {
                    type: object
                }
            }
            saved_instances {
                description: "Autoscaler app instances saved in ClearML"
                type: array
                items {
                    type: object
                }
            }
            console_log {
                description: "Recent Run:ai CLI refresh log lines"
                type: array
                items {
                    type: object
                }
            }
        }
    }
}

get_settings {
    "2.31" {
        description: "Get autoscaler settings for the company"
        request {
            type: object
            properties {}
        }
        response {
            type: object
            properties {
                settings {
                    description: "Current autoscaler settings"
                    "$ref": "#/_definitions/runai_settings"
                }
            }
        }
    }
}

set_settings {
    "2.31" {
        description: "Set autoscaler connection settings"
        request {
            "$ref": "#/_definitions/runai_settings"
        }
        response {
            type: object
            properties {
                updated {
                    description: "Number of updated records"
                    type: integer
                }
            }
        }
    }
}

reset_settings {
    "2.31" {
        description: "Reset autoscaler settings to defaults"
        request {
            type: object
            properties {}
        }
        response {
            type: object
            properties {
                updated {
                    description: "Number of updated records"
                    type: integer
                }
            }
        }
    }
}

test_connection {
    "2.31" {
        description: "Test connection to the configured Run:ai cluster"
        request {
            "$ref": "#/_definitions/runai_settings"
        }
        response {
            type: object
            properties {
                connected {
                    description: "Whether the connection succeeded"
                    type: boolean
                }
                error {
                    description: "Error message if connection failed"
                    type: string
                }
                projects_count {
                    description: "Number of Run:ai projects available to the connection"
                    type: integer
                }
            }
        }
    }
}

submit_workload {
    "2.31" {
        description: "Submit a workload to the configured Run:ai cluster using the stored connection"
        request {
            type: object
            properties {
                workload {
                    description: "Workload parameters"
                    "$ref": "#/_definitions/workload_request"
                }
            }
        }
        response {
            "$ref": "#/_definitions/execution_result"
        }
    }
}

get_execution {
    "2.31" {
        description: "Get the result of a workload execution"
        request {
            type: object
            properties {
                execution_id {
                    description: "The execution ID to query"
                    type: string
                }
            }
        }
        response {
            "$ref": "#/_definitions/execution_result"
        }
    }
}

get_dashboard {
    "2.31" {
        description: "Get live Run:ai dashboard data"
        request {
            type: object
            properties {}
        }
        response {
            "$ref": "#/_definitions/dashboard_data"
        }
    }
}

save_app_instance {
    "2.31" {
        description: "Save an autoscaler app instance configuration"
        request {
            type: object
            properties {
                workload {
                    description: "Workload parameters"
                    "$ref": "#/_definitions/workload_request"
                }
            }
        }
        response {
            type: object
            properties {
                status {
                    description: "Save status"
                    type: string
                }
                instance {
                    description: "Saved app instance"
                    type: object
                }
            }
        }
    }
}

delete_workload {
    "2.31" {
        description: "Delete or stop a Run:ai workload"
        request {
            type: object
            properties {
                instance_id {
                    description: "Saved autoscaler app instance id to remove"
                    type: string
                }
                workload_name {
                    description: "Name of the workload to delete"
                    type: string
                }
                workload_type {
                    description: "Type of workload: training, workspace, inference, or workload"
                    type: string
                }
                project {
                    description: "Run:ai project containing the workload"
                    type: string
                }
            }
        }
        response {
            "$ref": "#/_definitions/execution_result"
        }
    }
}
